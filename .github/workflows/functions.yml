name: Functions - Create PL/SQL

on:
  push:
    branches: [main, develop]
    paths: ['db/03_functions.sql']
  workflow_dispatch:

concurrency:
  group: functions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ORACLE_PWD: rsa_password_2025

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check signoff
        run: |
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q "^log:"; then exit 0; fi
          bash scripts/verify_signoff.sh

      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim

      - name: Install oracledb
        run: pip install oracledb

      - name: Wait for Oracle
        run: |
          python3 src/wait_oracle.py "${{ env.ORACLE_PWD }}" && exit 0
          docker logs oracle-xe
          exit 1

      - name: Execute DDL
        run: python3 src/run_sql.py "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1

      - name: Execute DML
        run: python3 src/run_sql.py "${{ env.ORACLE_PWD }}" db/02_dml.sql > /dev/null 2>&1

      - name: Execute Functions
        run: python3 src/run_sql.py "${{ env.ORACLE_PWD }}" db/03_functions.sql > log/03_functions.log 2>&1 || true

      - name: Commit logs
        run: |
          mkdir -p log
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q "^log:"; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log/
          git diff --cached --quiet && exit 0
          git commit -s -m "log: Functions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD:main
