name: CI

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ORACLE_PWD: rsa_password_2025

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check signoff
        run: python3 main.py signoff

  ddl:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > log/01_ddl.log 2>&1 || true

  dml:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1
      - name: Execute DML
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql > log/02_dml.log 2>&1 || true

  functions:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1
      - name: Execute DML
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql > /dev/null 2>&1
      - name: Execute Functions
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/03_functions.sql > log/03_functions.log 2>&1 || true

  triggers:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1
      - name: Execute DML
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql > /dev/null 2>&1
      - name: Execute Triggers
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/04_triggers.sql > log/04_triggers.log 2>&1 || true

  verify:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: mkdir -p log && python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1
      - name: Execute DML
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql > /dev/null 2>&1
      - name: Execute Functions
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/03_functions.sql > /dev/null 2>&1
      - name: Execute Triggers
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/04_triggers.sql > /dev/null 2>&1
      - name: Verify records
        run: python3 main.py verify "${{ env.ORACLE_PWD }}" > log/05_verify.log 2>&1 || true
      - name: Verify schema
        run: python3 main.py schema "${{ env.ORACLE_PWD }}" > log/06_schema.log 2>&1 || true

  status:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb
      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"
      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > /dev/null 2>&1
      - name: Execute DML
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql > /dev/null 2>&1
      - name: Execute Functions
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/03_functions.sql > /dev/null 2>&1
      - name: Execute Triggers
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/04_triggers.sql > /dev/null 2>&1
      - name: Report
        run: python3 main.py report "${{ env.ORACLE_PWD }}" > log/07_report.log 2>&1 || true

  log:
    needs: [ddl, dml, functions, triggers, verify, status]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commit logs
        run: |
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q "^log:"; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f log/
          git diff --cached --quiet && exit 0
          git commit -s -m "log: Verify $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push origin HEAD:main
