name: ci

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ORACLE_PWD: "test_password123"

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check signoff
        run: python3 main.py signoff

  run:
    needs: [signoff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Start oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim
      - run: pip install oracledb pyyaml
      - name: Wait for oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"

      - name: Execute ddl
        run: mkdir -p log && python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql 2>&1 | tee log/01_ddl.log
      - name: Execute dml
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/02_dml.sql 2>&1 | tee log/02_dml.log
      - name: Execute functions
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/03_functions.sql 2>&1 | tee log/03_functions.log
      - name: Execute triggers
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/04_triggers.sql 2>&1 | tee log/04_triggers.log
      - name: Verify records
        run: python3 main.py verify "${{ env.ORACLE_PWD }}" 2>&1 | tee log/05_verify.log
      - name: Verify schema
        run: python3 main.py schema "${{ env.ORACLE_PWD }}" 2>&1 | tee log/06_schema.log
      - name: Report
        run: python3 main.py report "${{ env.ORACLE_PWD }}" 2>&1 | tee log/07_report.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: log/
