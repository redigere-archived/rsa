name: DDL - Create Tables

on:
  push:
    branches: [main, develop]
    paths: ['db/01_ddl.sql']
  workflow_dispatch:

concurrency:
  group: ddl-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  ORACLE_PWD: rsa_password_2025

jobs:
  ddl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check signoff
        run: python3 main.py signoff

      - name: Start Oracle
        run: docker run -d --name oracle-xe -e ORACLE_PASSWORD=${{ env.ORACLE_PWD }} -p 1521:1521 gvenzl/oracle-free:23-slim

      - name: Install oracledb
        run: pip install oracledb

      - name: Wait for Oracle
        run: python3 main.py wait "${{ env.ORACLE_PWD }}"

      - name: Execute DDL
        run: python3 main.py run "${{ env.ORACLE_PWD }}" db/01_ddl.sql > log/01_ddl.log 2>&1 || true
